<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sekak Jowo - Lobby Utama</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f2fe">
    
    <link rel="stylesheet" href="CSS/Sekak.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<style>
body {
    margin: 0;
    padding: 0;
    min-height: 100vh;

    background-image: url("https://raw.githubusercontent.com/tempayanpapaya-coder/Sekak/refs/heads/main/Aset/Background1.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;

    font-family: Arial, sans-serif;
}
html, body {
    width: 100%;
    height: 100%;
    margin: 0;
}


.lobby-container {
    max-width: 500px;
    margin: 80px auto;
    background: rgba(255, 255, 255, 0.05);
    padding: 30px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}

.pesanAnak {
    max-width: 500px;
    margin: 80px auto;
    background: rgba(255, 255, 255, 0.05);
    padding: 30px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}

h1 {
    font-size: 28px;
    margin-bottom: 5px;
    background: linear-gradient(45deg, #00f2fe, #4facfe);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
.subtitle {
    color: #aaa;
    font-size: 14px;
    margin-bottom: 25px;
}
input[type="text"] {
    width: 100%;
    padding: 12px 20px;
    margin-bottom: 20px;
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 6px;
    color: white;
    font-size: 16px;
    box-sizing: border-box;
    transition: 0.3s;
}
input[type="text"]:focus {
    border-color: #00f2fe;
    outline: none;
    box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
}
.btn-masuk {
    width: 100%;
    padding: 12px;
    background: linear-gradient(45deg, #00f2fe, #4facfe);
    border: none;
    border-radius: 6px;
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
    transition: 0.3s;
}
.btn-masuk:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0, 242, 254, 0.5);
}
</style>
</head>
<body>

<div class="lobby-container">
    <h1>♟️ SEKAK JOWO</h1>
    <div class="subtitle">Sistem Registrasi Akun & Lobby Catur Online</div>
    
    <input type="text" id="input-nama-pemain" placeholder="Masukkan Nama / Username Kamu..." autocomplete="off">
    <button class="btn-masuk" onclick="prosesLoginOtomatis()">MASUK KE PERMAINAN</button>
</div>

<div class="live-matches-container" style="margin-top: 30px; background: #151722; padding: 20px; border-radius: 8px; color: #fff; max-width: 400px; margin-left: auto; margin-right: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
    <h3 style="color: #ff9f43; margin-top: 0; font-size: 16px; border-bottom: 1px solid #2d3246; padding-bottom: 8px; text-align: center;">
        🔥 PERTANDINGAN LIVE (SEDANG BERLANGSUNG)
    </h3>
    
    <div id="daftar-room-aktif">
        <p style="color: #aaa; font-size: 13px; font-style: italic; text-align: center;">Mencari pertandingan aktif...</p>
    </div>
</div>


<marquee class="pesanAnak" > Pertarungan Harga diri, yang kalah Pindah AGAMA</marquee>
<script>
// =============================================================================
// CONFIG FIREBASE (SINKRON DENGAN SEKAK.JS)
// =============================================================================
const firebaseConfig = {
    apiKey: "AIzaSyATIQKEoacfqd_P5mBn915gzwbsLQE-va8",
    authDomain: "spp-unisri-taekwondo.firebaseapp.com",
    projectId: "spp-unisri-taekwondo",
    storageBucket: "spp-unisri-taekwondo.firebasestorage.app",
    messagingSenderId: "888126318699",
    appId: "1:888126318699:web:6e1ef3d5a49908c2b5692e"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// =============================================================================
// FUNGSI LOGIK LOGIN & REDIRECT OTOMATIS
// =============================================================================
function prosesLoginOtomatis() {
    const namaInput = document.getElementById('input-nama-pemain').value.trim();

    // Validasi input kosong
    if (namaInput === "") {
        alert("Nama tidak boleh kosong! Silakan masukkan nama kamu.");
        return;
    }

    const akunTerkunci = localStorage.getItem("akun_device_ini");

    if (akunTerkunci) {

        if (namaInput !== akunTerkunci) {
            alert(`⚠️ AKSES DITOLAK!\nPerangkat ini sudah dikunci untuk akun: "${akunTerkunci}".\nAnda tidak bisa menggunakan nama lain di HP/Device ini!`);
            return; // 🛑 STOP! Gagalkan proses login, tidak lanjut ke Firebase
        }
    } else {
        localStorage.setItem("akun_device_ini", namaInput);
    }

    sessionStorage.setItem("catur_username", namaInput);
    sessionStorage.setItem("catur_peran", "w"); // Default peran awal sebagai Putih
    sessionStorage.setItem("catur_room_id", "");  // Belum ada room sebelum membuat/menerima tantangan

    // 2. Daftarkan status online pemain ke database Firestore secara realtime
    db.collection("para_pemain").doc(namaInput).set({
        status: "di_lobby", // Menandakan pemain siap di-lobby online
        lawan: "",
        roomId: "",
        waktuLogin: firebase.firestore.FieldValue.serverTimestamp()
    })
    .then(() => {
        console.log("Pendaftaran Akun Berhasil!");
        
        // 3. SEHARUSNYA OTOMATIS REDIRECT: Pindahkan pemain langsung ke arena game catur
        window.location.href = "Sekak.html?mode=ai";
    })
    .catch((error) => {
        console.error("Gagal mendaftarkan akun: ", error);
        alert("Terjadi kesalahan jaringan database. Silakan coba lagi.");
    });
}

// Otomatis deteksi akun saat halaman index dimuat
document.addEventListener("DOMContentLoaded", function() {
    const akunTerkunci = localStorage.getItem("akun_device_ini");
    const inputNama = document.getElementById('input-nama-pemain');

    if (akunTerkunci && inputNama) {
        inputNama.value = akunTerkunci; // Masukkan nama yang terkunci otomatis
        inputNama.disabled = true;      // Matikan inputnya agar tidak bisa diketik ulang
        inputNama.style.background = "#222533"; // Efek visual terkunci (opsional)
        inputNama.style.color = "#aaa";
    }
});

// --- SCRIPT REALTIME MONITORING LIVE MATCHES ---
document.addEventListener("DOMContentLoaded", function() {
    // Jalankan fungsi pemantau room aktif
    pantauPertandinganLive();
});

function pantauPertandinganLive() {
    console.log("Memulai pemantauan pertandingan aktif...");
    
    db.collection("room_catur").onSnapshot((snapshot) => {
        const areaDaftarRoom = document.getElementById('daftar-room-aktif');
        if (!areaDaftarRoom) return;

        areaDaftarRoom.innerHTML = ""; 

        if (snapshot.empty) {
            areaDaftarRoom.innerHTML = `<p style="color:#aaa; font-size:13px; font-style: italic; text-align:center;">📭 Saat ini tidak ada pertandingan aktif.</p>`;
            return;
        }

        snapshot.forEach((doc) => {
            const roomIdAktif = doc.id;
            const dataRoom = doc.data();
            
            let namaPutih = "Pemain 1";
            let namaHitam = "Pemain 2";
            
            if (roomIdAktif.includes("_vs_")) {
                let bagian = roomIdAktif.split('_vs_');
                if (bagian.length > 1) {
                    namaPutih = bagian[0].replace('room_', '');
                    namaHitam = bagian[1].split('_')[0];
                }
            }

            // 1. LOGIKA PERUBAHAN TEKS JIKA GAME TELAH SELESAI
            let infoTeksPertandingan = "";
            let infoTombolAksi = "";

            if (dataRoom.statusGame === "selesai") {
                // Tentukan siapa yang menang berdasarkan data Firebase
                let teksPemenang = dataRoom.pemenang === "Putih" ? `${namaPutih} WIN 👑` : `${namaHitam} WIN 👑`;
                
                infoTeksPertandingan = `
                    <span style="color:#aaa; font-size:13px;">⚪ ${namaPutih} vs ⚫ ${namaHitam}</span>
                    <br><span style="color:#39ff14; font-weight:bold; font-size:12px; display:block; margin-top:4px;">🎉 ${teksPemenang}</span>
                `;
                
                infoTombolAksi = `
                    <button onclick="tontonPertandingan('${roomIdAktif}')" style="background:#555; color:white; border:none; padding:6px 12px; border-radius:4px; font-weight:bold; cursor:pointer; font-size:11px; transition: 0.2s;">
                        📜 LIHAT RIWAYAT
                    </button>
                `;
            } else {
                // Tampilan Normal jika game masih berjalan (sedang live)
                infoTeksPertandingan = `
                    <span style="color:#fff; font-weight:bold; font-size:13px;">⚪ ${namaPutih}</span> 
                    <br><span style="color:#ff9f43; font-size:11px; font-weight:bold; display:block; margin:2px 0;">VS</span>
                    <span style="color:#fff; font-weight:bold; font-size:13px;">⚫ ${namaHitam}</span>
                `;
                
                infoTombolAksi = `
                    <button onclick="tontonPertandingan('${roomIdAktif}')" style="background:#ff9f43; color:white; border:none; padding:6px 12px; border-radius:4px; font-weight:bold; cursor:pointer; font-size:12px; transition: 0.2s;">
                        👁️ TONTON
                    </button>
                `;
            }

            // Buat komponen HTML untuk list
            const itemRoom = document.createElement('div');
            itemRoom.style.cssText = "display:flex; justify-content:space-between; align-items:center; background:#1f222f; padding:12px 15px; margin-bottom:10px; border-radius:6px; border:1px solid #2d3246;";

            itemRoom.innerHTML = `
                <div style="text-align: left; flex: 1; padding-right: 10px;">
                    ${infoTeksPertandingan}
                </div>
                <div>
                    ${infoTombolAksi}
                </div>
            `;

            areaDaftarRoom.appendChild(itemRoom);
        });
    }, (error) => {
        console.error("Error mendengarkan live matches: ", error);
    });
}


// Fungsi yang dipicu saat tombol 👁️ TONTON diklik
function tontonPertandingan(idKamar) {
    // Set identitas sebagai Penonton (Spectator) di Session Storage
    sessionStorage.setItem("catur_room_id", idKamar);
    sessionStorage.setItem("catur_peran", "viewer"); // Peran khusus penonton, bukan 'w' atau 'b'
    
    // Buat nama samaran penonton agar tidak bentrok dengan pemain asli
    if (!sessionStorage.getItem("catur_username")) {
        sessionStorage.setItem("catur_username", "Penonton_" + Math.floor(1000 + Math.random() * 9000));
    }

    alert("Masuk sebagai mode penonton. Anda tidak dapat menggerakkan bidak.");
    
    // Alihkan langsung ke halaman arena catur dengan parameter mode friend
    window.location.href = "Sekak.html?mode=friend";
}

</script>

</body>
</html>
