<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sekak Jowo - Lobby Utama</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f2fe">
    
    <link rel="stylesheet" href="CSS/Sekak.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<style>
body {
    margin: 0;
    padding: 0;
    min-height: 100vh;

    background-image: url("https://raw.githubusercontent.com/tempayanpapaya-coder/Sekak/refs/heads/main/Aset/Background1.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;

    font-family: Arial, sans-serif;
}
html, body {
    width: 100%;
    height: 100%;
    margin: 0;
}


.lobby-container {
    max-width: 500px;
    margin: 80px auto;
    background: rgba(255, 255, 255, 0.05);
    padding: 30px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}

.pesanAnak {
    max-width: 500px;
    margin: 80px auto;
    background: rgba(255, 255, 255, 0.05);
    padding: 30px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}

h1 {
    font-size: 28px;
    margin-bottom: 5px;
    background: linear-gradient(45deg, #00f2fe, #4facfe);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
.subtitle {
    color: #aaa;
    font-size: 14px;
    margin-bottom: 25px;
}
input[type="text"] {
    width: 100%;
    padding: 12px 20px;
    margin-bottom: 20px;
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 6px;
    color: white;
    font-size: 16px;
    box-sizing: border-box;
    transition: 0.3s;
}
input[type="text"]:focus {
    border-color: #00f2fe;
    outline: none;
    box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
}
.btn-masuk {
    width: 100%;
    padding: 12px;
    background: linear-gradient(45deg, #00f2fe, #4facfe);
    border: none;
    border-radius: 6px;
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
    transition: 0.3s;
}
.btn-masuk:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0, 242, 254, 0.5);
}
</style>
</head>
<body>

<div class="lobby-container">
    <h1>♟️ SEKAK JOWO</h1>
    <div class="subtitle">Sistem Registrasi Akun & Lobby Catur Online</div>
    
    <input type="text" id="input-nama-pemain" placeholder="Masukkan Nama / Username Kamu..." autocomplete="off">
    <button class="btn-masuk" onclick="prosesLoginOtomatis()">MASUK KE PERMAINAN</button>
</div>
<marquee class="pesanAnak" > Pertarungan Harga diri, yang kalah Pindah AGAMA</marquee>
<script>
// =============================================================================
// CONFIG FIREBASE (SINKRON DENGAN SEKAK.JS)
// =============================================================================
const firebaseConfig = {
    apiKey: "AIzaSyATIQKEoacfqd_P5mBn915gzwbsLQE-va8",
    authDomain: "spp-unisri-taekwondo.firebaseapp.com",
    projectId: "spp-unisri-taekwondo",
    storageBucket: "spp-unisri-taekwondo.firebasestorage.app",
    messagingSenderId: "888126318699",
    appId: "1:888126318699:web:6e1ef3d5a49908c2b5692e"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// =============================================================================
// FUNGSI LOGIK LOGIN & REDIRECT OTOMATIS
// =============================================================================
function prosesLoginOtomatis() {
    const namaInput = document.getElementById('input-nama-pemain').value.trim();

    // Validasi input kosong
    if (namaInput === "") {
        alert("Nama tidak boleh kosong! Silakan masukkan nama kamu.");
        return;
    }

    // 1. Simpan data identitas ke dalam Session Storage Browser
    sessionStorage.setItem("catur_username", namaInput);
    sessionStorage.setItem("catur_peran", "w"); // Default peran awal sebagai Putih
    sessionStorage.setItem("catur_room_id", "");  // Belum ada room sebelum membuat/menerima tantangan

    // 2. Daftarkan status online pemain ke database Firestore secara realtime
    db.collection("para_pemain").doc(namaInput).set({
        status: "di_lobby", // Menandakan pemain siap di-lobby online
        lawan: "",
        roomId: "",
        waktuLogin: firebase.firestore.FieldValue.serverTimestamp()
    })
    .then(() => {
        console.log("Pendaftaran Akun Berhasil!");
        
        // 3. SEHARUSNYA OTOMATIS REDIRECT: Pindahkan pemain langsung ke arena game catur
        // Kita arahkan default ke mode 'ai' (Singleplayer) atau halaman utama arena catur
        window.location.href = "Sekak.html?mode=ai";
    })
    .catch((error) => {
        console.error("Gagal mendaftarkan akun: ", error);
        alert("Terjadi kesalahan jaringan database. Silakan coba lagi.");
    });
}
</script>

</body>
</html>
